<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c5c8c6;
  font-family: 'Courier New', monospace;
  padding: 20px;
  min-height: 100vh;
}
h1 {
  font-size: 1.4rem;
  color: #81a2be;
  margin-bottom: 16px;
  border-bottom: 1px solid #2d2d3a;
  padding-bottom: 8px;
}
.nav {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.nav button {
  background: #1d1d2b;
  border: 1px solid #2d2d3a;
  color: #9698a3;
  padding: 6px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.8rem;
  transition: all 0.15s;
}
.nav button:hover { background: #2d2d3a; color: #c5c8c6; }
.nav button.active { background: #2d2d3a; color: #81a2be; border-color: #81a2be; }
.section { display: none; margin-bottom: 24px; }
.section.active { display: block; }
.section-title {
  font-size: 0.9rem;
  color: #b5bd68;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
  margin-bottom: 20px;
}
th {
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid #2d2d3a;
  color: #9698a3;
  font-weight: normal;
}
td {
  padding: 5px 8px;
  border-bottom: 1px solid #1a1a28;
  white-space: nowrap;
}
tr:hover td { background: #141420; }
.positive { color: #5fad5f; }
.negative { color: #cc6666; }
.symbol { color: #81a2be; }
.price { text-align: right; }
.change { text-align: right; }
.volume { text-align: right; color: #9698a3; }
.loading { color: #9698a3; font-size: 0.8rem; }
.error { color: #cc6666; font-size: 0.8rem; }
.funding-exch { font-size: 0.65rem; color: #9698a3; }
</style>
</head>
<body>
<h1>Market Dashboard</h1>

<div class="nav" id="marketNav"></div>

<div id="sections"></div>

<script>
const MARKETS = [
  { id: 'crypto', label: 'Crypto' },
  { id: 'stocks', label: 'Stocks USA' },
  { id: 'forex', label: 'Forex' },
  { id: 'cfd', label: 'CFD' },
  { id: 'funding', label: 'Funding Rates' },
];

let currentMarket = 'crypto';

function init() {
  const nav = document.getElementById('marketNav');
  const sections = document.getElementById('sections');

  MARKETS.forEach(m => {
    const btn = document.createElement('button');
    btn.textContent = m.label;
    btn.dataset.market = m.id;
    btn.onclick = () => switchMarket(m.id);
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'section-' + m.id;

    if (m.id === 'funding') {
      div.innerHTML = `
        <div class="grid">
          <div><div class="section-title">Top Positive Funding</div><div id="funding-positive" class="loading">Cargando...</div></div>
          <div><div class="section-title">Top Negative Funding</div><div id="funding-negative" class="loading">Cargando...</div></div>
        </div>
        <div class="grid">
          <div><div class="section-title">Top Positive to Close</div><div id="funding-positive-close" class="loading">Cargando...</div></div>
          <div><div class="section-title">Top Negative to Close</div><div id="funding-negative-close" class="loading">Cargando...</div></div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="grid">
          <div><div class="section-title">Top Gainers</div><div id="${m.id}-gainers" class="loading">Cargando...</div></div>
          <div><div class="section-title">Top Losers</div><div id="${m.id}-losers" class="loading">Cargando...</div></div>
        </div>
        <div class="section-title" style="margin-top:8px">Most Active</div>
        <div id="${m.id}-most_active" class="loading">Cargando...</div>
      `;
    }

    sections.appendChild(div);
  });

  switchMarket('crypto');
  setInterval(refreshAll, 60000);
}

function switchMarket(market) {
  currentMarket = market;
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.market === market);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + market).classList.add('active');
  refreshMarket(market);
}

function refreshAll() {
  MARKETS.forEach(m => refreshMarket(m.id));
}

function refreshMarket(market) {
  if (market === 'funding') {
    fetchFunding();
    return;
  }
  fetchAndRender(market, 'gainers');
  fetchAndRender(market, 'losers');
  fetchAndRender(market, 'most_active');
}

function fmtChange(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function fmtPrice(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  if (n >= 1000) return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 1) return n.toFixed(4);
  return n.toFixed(6);
}

function fmtVolume(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toFixed(1);
}

function fmtFunding(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  return (n * 100).toFixed(4) + '%';
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(parseInt(ts));
  return d.toLocaleTimeString();
}

function fmtTimeRemaining(ms) {
  if (!ms || ms <= 0) return '—';
  const totalMin = Math.floor(ms / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins = totalMin % 60;
  if (hours > 0) return hours + 'h ' + mins + 'm';
  return mins + 'm';
}

function buildTable(data, columns) {
  if (!data || data.length === 0) return '<span class="error">Sin datos</span>';
  let html = '<table><thead><tr>';
  columns.forEach(c => { html += '<th>' + c.label + '</th>'; });
  html += '</tr></thead><tbody>';
  data.forEach(row => {
    html += '<tr>';
    columns.forEach(c => {
      let val = row[c.key];
      if (c.type === 'change') {
        const cls = val >= 0 ? 'positive' : 'negative';
        html += '<td class="change ' + cls + '">' + fmtChange(val) + '</td>';
      } else if (c.type === 'price') {
        html += '<td class="price">' + fmtPrice(val) + '</td>';
      } else if (c.type === 'volume') {
        html += '<td class="volume">' + fmtVolume(val) + '</td>';
      } else if (c.type === 'symbol') {
        html += '<td class="symbol">' + (val || '—') + '</td>';
      } else if (c.type === 'funding') {
        const cls = val >= 0 ? 'positive' : 'negative';
        html += '<td class="change ' + cls + '">' + fmtFunding(val) + '</td>';
      } else if (c.type === 'exchange') {
        html += '<td class="funding-exch">' + (val || '—') + '</td>';
      } else if (c.type === 'time') {
        html += '<td class="volume">' + fmtTime(val) + '</td>';
      } else if (c.type === 'timeremaining') {
        html += '<td class="volume">' + fmtTimeRemaining(val) + '</td>';
      } else {
        html += '<td>' + (val || '—') + '</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

async function fetchAndRender(market, type) {
  const el = document.getElementById(market + '-' + type);
  if (!el) return;
  try {
    const r = await fetch('/api/' + type + '?market=' + market + '&limit=10');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    el.innerHTML = buildTable(data, [
      { key: 'ticker', label: 'Símbolo', type: 'symbol' },
      { key: 'name', label: 'Nombre', type: 'text' },
      { key: 'close', label: 'Precio', type: 'price' },
      { key: 'change', label: 'Cambio %', type: 'change' },
      { key: 'volume', label: 'Volumen', type: 'volume' },
    ]);
  } catch (e) {
    el.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }
}

async function fetchFunding() {
  const ids = ['funding-positive', 'funding-negative', 'funding-positive-close', 'funding-negative-close'];
  const els = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
  if (!els['funding-positive'] || !els['funding-negative']) return;
  try {
    const r = await fetch('/api/funding_rates');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const cols = [
      { key: 'symbol', label: 'Símbolo', type: 'symbol' },
      { key: 'exchange', label: 'Exchange', type: 'exchange' },
      { key: 'fundingRate', label: 'Funding Rate', type: 'funding' },
      { key: 'nextFundingTime', label: 'Próximo Funding', type: 'time' },
    ];
    els['funding-positive'].innerHTML = buildTable(data.positive, cols);
    els['funding-negative'].innerHTML = buildTable(data.negative, cols);
    const closeCols = [
      { key: 'symbol', label: 'Símbolo', type: 'symbol' },
      { key: 'exchange', label: 'Exchange', type: 'exchange' },
      { key: 'fundingRate', label: 'Rate Actual', type: 'funding' },
      { key: 'timeToNextFunding', label: 'Tiempo Restante', type: 'timeremaining' },
    ];
    els['funding-positive-close'].innerHTML = buildTable(data.positive, closeCols);
    els['funding-negative-close'].innerHTML = buildTable(data.negative, closeCols);
  } catch (e) {
    ids.forEach(id => { if (els[id]) els[id].innerHTML = '<span class="error">Error: ' + e.message + '</span>'; });
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
